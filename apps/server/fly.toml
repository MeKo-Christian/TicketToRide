app = "ttr-hannover-server"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  TTR_PORT = "8080"
  TTR_LOG_LEVEL = "info"
  TTR_ROOM_TTL = "1h"
  TTR_SWEEP_INTERVAL = "1m"
  # Override TTR_CORS_ORIGIN in `fly secrets set` to point at your Pages origin.
  TTR_CORS_ORIGIN = "https://meko-christian.github.io"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
