name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'apps/server/**'
      - '.github/workflows/server-ci.yml'

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/server

jobs:
  check:
    name: Lint, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/server/go.sum

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          working-directory: apps/server

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
